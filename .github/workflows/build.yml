name: Build & Package ACAP

# Runs on pushes to main (produces a build artifact) and on version tags
# (v*.*.* pattern — additionally uploads the .eap to a GitHub Release).
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  # The Axis Computer Vision SDK image used to package the .eap.
  # Pin to a specific digest in production for reproducibility.
  ACAP_SDK_IMAGE: axisecp/acap-computer-vision-sdk:3.3-aarch64

jobs:
  # ── Job 1: Run tests first — build is gated on this ────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r app/requirements.txt -r tests/requirements-test.txt

      - run: pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7

  # ── Job 2: Build ARM64 Docker image and package .eap ───────────────────────
  build:
    name: Build linux/arm64 image + package .eap
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU enables ARM64 emulation on the AMD64 GitHub runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Buildx is required for --platform cross-builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Determine a version string for the artifact name.
      - name: Derive version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      # Build the ARM64 image and export it as a tar archive.
      # 'load' is not available for cross-platform builds, so we use
      # --output type=docker to write the image tar directly.
      - name: Build ARM64 Docker image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --output "type=docker,dest=image.tar" \
            --tag weather-acap:${{ steps.version.outputs.version }} \
            .

      # The Axis CV SDK acap-build tool reads manifest.json + image.tar from
      # the working directory and produces a *.eap file.
      - name: Package .eap with Axis ACAP SDK
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ${{ env.ACAP_SDK_IMAGE }} \
            acap-build .

      # Rename the .eap to include the version for traceability.
      - name: Rename .eap artifact
        run: |
          EAP_FILE=$(ls *.eap | head -1)
          mv "$EAP_FILE" "weather-acap-${{ steps.version.outputs.version }}.eap"
          echo "EAP_FILE=weather-acap-${{ steps.version.outputs.version }}.eap" >> "$GITHUB_ENV"

      - name: Upload .eap as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-acap-${{ steps.version.outputs.version }}
          path: "*.eap"
          retention-days: 30

  # ── Job 3: Publish to GitHub Release (tags only) ───────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # Only run on version tags, not on every push to main.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # required to create/upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .eap artifact
        uses: actions/download-artifact@v4
        with:
          name: weather-acap-${{ github.ref_name }}
          path: dist/

      - name: Create GitHub Release and upload .eap
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Weather ACAP ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          body: |
            ## Weather ACAP ${{ github.ref_name }}

            ### Installation
            1. Download the `.eap` file below.
            2. In the Axis device web interface, go to **Apps → Add app**.
            3. Upload the `.eap` file and click **Install**.
            4. Start the app and open the config UI on port **8080**.

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: dist/*.eap
